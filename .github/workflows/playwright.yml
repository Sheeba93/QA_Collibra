name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      env:
        required: true
        type: choice
        description: Select environment
        options:
          - qa
          - dev
      tags:
        required: false
        type: string
        description: Enter tags to filter tests (comma-separated)


jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ github.event.inputs.env }}
      TEST_TAGS: ${{ github.event.inputs.tags }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --reporter=html
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
  view-report:
      needs: test   # ✅ run after tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/download-artifact@v4
          with:
            name: playwright-report
            path: playwright-report
        - name: Publish Report URL
          run: |
            echo "### Playwright Report" >> $GITHUB_STEP_SUMMARY
            echo "You can download and open the report locally:" >> $GITHUB_STEP_SUMMARY
            echo "- Artifact: [Playwright Report](./playwright-report/index.html)" >> $GITHUB_STEP_SUMMARY
